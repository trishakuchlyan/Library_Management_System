<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - MMMC Central Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">
    <div id="header-placeholder"></div>

    <main class="main-content">
        <aside class="sidebar" id="sidebar-placeholder"></aside>

        <section class="display-pane" id="main-content">
            <div class="page-title">
                Student Portal Sign-In
                <span class="fig-no">Fig 7.11 Student login page</span>
            </div>

            <div class="gov-form" style="margin: 20px auto;">
                <h3 style="margin-bottom: 15px; color: var(--gov-blue-dark); text-align: center; border-bottom: 1px solid #EEE; padding-bottom: 8px;">Student Login Panel</h3>
                
                <div id="student-login-error" class="hidden text-danger" style="margin-bottom: 15px; text-align: center; font-weight: bold; font-size: 13px;"></div>

                <form onsubmit="handleStudentLogin(event)">
                    <div class="form-group">
                        <label for="student-login-id">Registration ID <span class="required-star">*</span></label>
                        <input type="text" id="student-login-id" placeholder="Enter Registration ID (e.g. STU101)" required>
                    </div>
                    <div class="form-group">
                        <label for="student-login-password">Password <span class="required-star">*</span></label>
                        <input type="password" id="student-login-password" placeholder="Enter Password" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Login to Portal</button>
                        <button type="button" class="btn btn-secondary" onclick="location.href='student_register.html'">Register New ID</button>
                    </div>
                </form>

                <div style="margin-top: 20px; font-size: 12px; color: #666; border-top: 1px dashed #DDD; padding-top: 10px; text-align: center;">
                    <strong>Mock Credentials:</strong><br>
                    Student ID: <strong>STU101</strong> & Password: <strong>password123</strong><br>
                    Student ID: <strong>STU102</strong> & Password: <strong>password123</strong>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
</div>

<script src="app.js"></script>
<script src="layout.js"></script>
</body>
</html>
