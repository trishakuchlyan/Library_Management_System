<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - MMMC Central Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">
    <div id="header-placeholder"></div>

    <main class="main-content">
        <aside class="sidebar" id="sidebar-placeholder"></aside>

        <section class="display-pane" id="main-content">
            <div class="page-title">
                Administrative Portal Sign-In
                <span class="fig-no">Fig 7.2 Admin Login Page</span>
            </div>

            <div class="gov-form" style="margin: 20px auto;">
                <h3 style="margin-bottom: 15px; color: var(--gov-blue-dark); text-align: center; border-bottom: 1px solid #EEE; padding-bottom: 8px;">Admin Login Panel</h3>
                
                <div id="admin-login-error" class="hidden text-danger" style="margin-bottom: 15px; text-align: center; font-weight: bold; font-size: 13px;"></div>

                <form onsubmit="handleAdminLogin(event)">
                    <div class="form-group">
                        <label for="admin-username">Username <span class="required-star">*</span></label>
                        <input type="text" id="admin-username" placeholder="Enter admin username" required>
                    </div>
                    <div class="form-group">
                        <label for="admin-password">Password <span class="required-star">*</span></label>
                        <input type="password" id="admin-password" placeholder="Enter password" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Login to Admin Desk</button>
                        <button type="button" class="btn btn-secondary" onclick="location.href='index.html'">Cancel</button>
                    </div>
                </form>
                
                <div style="margin-top: 20px; font-size: 12px; color: #666; border-top: 1px dashed #DDD; padding-top: 10px; text-align: center;">
                    <strong>System Notice:</strong> Only authorised library officers may access this terminal.<br>
                    <span style="color:#004488; font-style:italic;">Mock Credentials: Username: <strong>admin</strong> | Password: <strong>admin123</strong></span>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
</div>

<script src="app.js"></script>
<script src="layout.js"></script>
</body>
</html>
